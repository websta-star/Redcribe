{% extends "base.html" %}

{% block title %}Delete Video - Habesha Redcribe{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 50px auto; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;">

    <h2>Delete Video</h2>
    <p>Are you sure you want to delete <strong>{{ video.title }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" style="padding: 8px 15px; background:#f44336; color:#fff; border:none; border-radius:6px; cursor:pointer;">
            Yes, Delete
        </button>
        <a href="{% url 'home' %}" style="margin-left:10px; color:#555;">Cancel</a>
    </form>

</div>
{% endblock %}
